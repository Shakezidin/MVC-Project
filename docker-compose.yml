services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: bankuser
      DB_PASSWORD: bankpass
      DB_NAME: bankdb
      DB_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: super-secret-jwt-key-change-in-production-min-32-chars
      JWT_EXPIRY: 24h
      LOG_LEVEL: debug
      REQUEST_TIMEOUT: 30s
      RATE_LIMIT_RPS: 100
      RATE_LIMIT_BURST: 200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpass
      POSTGRES_DB: bankdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser -d bankdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  seed:
    build:
      context: .
      dockerfile: docker/Dockerfile
    entrypoint: ["./bank-seed"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: bankuser
      DB_PASSWORD: bankpass
      DB_NAME: bankdb
      DB_SSLMODE: disable
      JWT_SECRET: super-secret-jwt-key-change-in-production-min-32-chars
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["seed"]

volumes:
  postgres_data:
  redis_data:
